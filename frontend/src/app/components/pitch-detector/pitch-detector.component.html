<div class="glass-panel" style="padding: 1rem; display: flex; align-items: center; justify-content: space-between; margin-top: 1rem;">
  <div style="display: flex; align-items: center; gap: 0.5rem;">
    <ng-container *ngIf="isListening; else micOff">
      <lucide-icon [name]="MicIcon" color="var(--primary-color)"></lucide-icon>
    </ng-container>
    <ng-template #micOff>
      <lucide-icon [name]="MicOffIcon" color="var(--text-muted)"></lucide-icon>
    </ng-template>
    <span>Live Scoring</span>
  </div>
  
  <ng-container *ngIf="finalScore !== null && !isPlaying; else activeBar">
    <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">
      Score: {{ finalScore }} / 100
    </div>
  </ng-container>
  
  <ng-template #activeBar>
    <div style="width: 50%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden;">
      <div [style.width.%]="score" style="
        height: 100%; 
        background: var(--primary-color);
        transition: width 0.1s ease-out;
      "></div>
    </div>
  </ng-template>
</div>
